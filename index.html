<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* STARS BACKGROUND */
#stars span {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.2;}
  to {opacity: 1;}
}

/* MAIN */
#main {
  padding: 20px;
}

.section {
  margin: 25px auto;
  padding: 20px;
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  backdrop-filter: blur(12px);
}

button {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #ff6b81;
  color: white;
  cursor: pointer;
  margin: 5px;
}

/* MEMORY */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 70px);
  gap: 10px;
  justify-content: center;
}

.card {
  width: 70px;
  height: 70px;
  background: #ff6b81;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  border-radius: 10px;
}

/* CATCH GAME */
#catchArea {
  height: 150px;
  position: relative;
  overflow: hidden;
}

#heart {
  position: absolute;
  font-size: 25px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="stars"></div>

<div id="main">

<h1>This little place is for you 🤍</h1>
<p>Since [your date]</p>

<!-- MUSIC -->
<div class="section">
<h3>🎧 Tap for music</h3>
<button onclick="playMusic()">Play</button>
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<!-- MEMORY -->
<div class="section">
<h2>🧩 Memory Game</h2>
<div class="grid" id="grid"></div>
</div>

<!-- QUESTIONS -->
<div class="section">
<h2>❓ Questions</h2>
<p id="question"></p>
<div id="options"></div>
<p id="result"></p>
</div>

<!-- CATCH GAME -->
<div class="section">
<h2>❤️ Catch me</h2>
<div id="catchArea">
<span id="heart">❤️</span>
</div>
<p id="score">Score: 0</p>
</div>

<!-- RANDOM MESSAGE -->
<div class="section">
<h2>💌 Message</h2>
<button onclick="randomMsg()">Click</button>
<p id="msg"></p>
</div>

</div>

<script>
// MUSIC
function playMusic(){
 document.getElementById("music").play();
}

// STARS
for(let i=0;i<60;i++){
 let s=document.createElement("span");
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}

// MEMORY GAME
let emojis=["🤍","🌙","✨","💫","💖","🌸","🤍","🌙","✨","💫","💖","🌸"];
emojis.sort(()=>0.5-Math.random());
let first=null;

emojis.forEach(e=>{
 let c=document.createElement("div");
 c.className="card";
 c.innerText="?";

 c.onclick=()=>{
  c.innerText=e;
  if(!first) first=c;
  else{
   if(first.innerText!==c.innerText){
    setTimeout(()=>{
     c.innerText="?";
     first.innerText="?";
     first=null;
    },700);
   } else first=null;
  }
 };
 document.getElementById("grid").appendChild(c);
});

// QUESTIONS
let q=[
["Who loves you the most?",["Me","Also me"],"Me"],
["Who misses you?",["Me","Still me"],"Me"],
["Who made this?",["Me","Obviously me"],"Me"],
["Who thinks about you all the time?",["Me","Always me"],"Me"],
["Who is lucky?",["You","Me"],"You"],
["What are you to me?",["Everything","Just someone"],"Everything"]
];

let i=0;

function loadQ(){
 document.getElementById("question").innerText=q[i][0];
 let opt=document.getElementById("options");
 opt.innerHTML="";
 q[i][1].forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o);
  opt.appendChild(b);
 });
}

function check(o){
 document.getElementById("result").innerText=
 o===q[i][2]?"Correct 🤍":"Wrong 😤";
 i++;
 if(i<q.length)setTimeout(loadQ,800);
 else document.getElementById("question").innerText="Done 🤍";
}

loadQ();

// CATCH GAME
let heart=document.getElementById("heart");
let score=0;

function moveHeart(){
 heart.style.left=Math.random()*70+"%";
 heart.style.top=Math.random()*70+"%";
}

heart.onclick=()=>{
 score++;
 document.getElementById("score").innerText="Score: "+score;
 moveHeart();
};

moveHeart();

// RANDOM MESSAGE
function randomMsg(){
 let msgs=[
 "You matter to me",
 "I like you more than I show",
 "You're my favorite person",
 "I thought of you today",
 "You make everything better",
 "I’d choose you again",
 "You feel like home"
 ];
 document.getElementById("msg").innerText=
 msgs[Math.floor(Math.random()*msgs.length)];
}
</script>

</body>
</html>
