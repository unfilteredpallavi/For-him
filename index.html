<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🤍</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  text-align: center;
}

/* MUSIC BAR */
.music-bar {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  backdrop-filter: blur(10px);
}

/* SECTIONS */
.section {
  margin: 25px auto;
  padding: 20px;
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
}

button {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #ff6b81;
  color: white;
  cursor: pointer;
}

/* MEMORY */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 70px);
  gap: 10px;
  justify-content: center;
}

.card {
  width: 70px;
  height: 70px;
  background: #ff6b81;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 10px;
}

/* CERTIFICATE */
.certificate {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- 🎧 MUSIC -->
<div class="music-bar">
  <button onclick="toggleMusic()">▶️ / ⏸</button>
  <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<h1>This little place is for you 🤍</h1>
<p>Since [your date]</p>

<!-- MEMORY -->
<div class="section">
<h2>🧩 Memory</h2>
<div class="grid" id="grid"></div>
</div>

<!-- QUESTIONS -->
<div class="section">
<h2>❓ Questions</h2>
<p id="question"></p>
<div id="options"></div>
<p id="result"></p>
</div>

<!-- MESSAGE -->
<div class="section">
<h2>💌 Message</h2>
<button onclick="randomMsg()">Click</button>
<p id="msg"></p>
</div>

<!-- CERTIFICATE -->
<div class="section">
<h2>📜 Certificate</h2>
<div class="certificate">
<h2>Ansh</h2>
<p>Best Boyfriend Ever 🤍</p>
</div>
</div>

<script>
// MUSIC
let playing=false;
function toggleMusic(){
 let m=document.getElementById("music");
 if(playing){ m.pause(); playing=false; }
 else { m.play(); playing=true; }
}
function setVolume(v){
 document.getElementById("music").volume=v;
}

// MEMORY
let arr=["💖","✨","🌙","💫","💖","✨","🌙","💫"];
arr.sort(()=>0.5-Math.random());

let first=null;
arr.forEach(e=>{
 let c=document.createElement("div");
 c.className="card";
 c.innerText="?";

 c.onclick=()=>{
  c.innerText=e;
  if(!first) first=c;
  else{
   if(first.innerText!==c.innerText){
    setTimeout(()=>{c.innerText="?";first.innerText="?";first=null},500);
   } else first=null;
  }
 };
 document.getElementById("grid").appendChild(c);
});

// QUESTIONS
let q=[
["Who loves you?",["Me","Also me"],"Me"],
["Who misses you?",["Me","Still me"],"Me"]
];

let i=0;
function loadQ(){
 document.getElementById("question").innerText=q[i][0];
 let opt=document.getElementById("options");
 opt.innerHTML="";
 q[i][1].forEach(o=>{
  let b=document.createElement("button");
  b.innerText=o;
  b.onclick=()=>check(o);
  opt.appendChild(b);
 });
}
function check(o){
 document.getElementById("result").innerText=o===q[i][2]?"Correct":"Wrong";
 i++;
 if(i<q.length)setTimeout(loadQ,800);
}
loadQ();

// MESSAGE
function randomMsg(){
 let msgs=["You matter to me","You're special","I like you"];
 document.getElementById("msg").innerText=
 msgs[Math.floor(Math.random()*msgs.length)];
}
</script>

</body>
</html>
